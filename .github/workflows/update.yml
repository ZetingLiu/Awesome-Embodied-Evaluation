name: Refresh benchmark lists and metadata

# 1) Discover new benchmark entries (VLM/VLA/WM) with strict auto-guards
# 2) Re-render README tables and refresh Stars / Updated metadata
# 3) Open/update an automated PR when files change

on:
  schedule:
    # Twice a week: Monday and Thursday at 03:00 UTC.
    - cron: "0 3 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-benchmark-metadata
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover benchmark entries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discover_benchmarks.py

      - name: Render README tables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/render_readme.py

      - name: Create pull request if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bot/auto-benchmark-refresh
          title: "chore: auto-refresh benchmark lists and metadata"
          commit-message: "chore: auto-refresh benchmark lists and metadata [skip ci]"
          body: |
            Automated benchmark refresh:
            - discover new VLM/VLA/WM benchmark entries (paper+code+relevance guards)
            - refresh Stars / Updated metadata
            - re-render README.md and README_CN.md tables
          labels: |
            automation
            benchmark-update
          add-paths: |
            data/benchmarks.yaml
            data/.cache/metadata.json
            README.md
            README_CN.md
