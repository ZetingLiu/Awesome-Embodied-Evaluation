name: Refresh benchmark metadata

# Re-renders the README tables from data/benchmarks.yaml, refreshing the
# machine-managed Stars / Updated columns from the GitHub API. Runs weekly and
# on manual dispatch; commits straight to main only when something changed.

on:
  schedule:
    # Every Monday at 03:00 UTC.
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-benchmark-metadata
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Render README tables
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/render_readme.py

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md README_CN.md data/.cache/metadata.json
            git commit -m "chore: refresh benchmark metadata [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
