# Single source of truth for benchmark tables in README.md / README_CN.md.
#
# Human-curated fields: seq, name, track, year_*, tests_*, metric_*, links.
# `seq` is the per-capability row number shown as the first table column
# (Reasoning & Planning / Action / World Modeling each starts at 1).
# New entries must take the next seq within their track; run `python scripts/render_readme.py --assign-seq`
# after bulk edits, or let discover_benchmarks.py assign automatically on append.
# Optional ecosystem completeness fields (fill gradually when evidence is clear):
#   ecosystem:
#     paper: public | report | missing
#     code: official | third_party | missing
#     data_or_tasks: public | partial | simulator_only | missing
#     protocol: documented | partial | unclear
#     leaderboard: available | inactive | absent
# Machine-managed fields (Stars / Updated) are fetched at render time using
# `repo` and injected by scripts/render_readme.py.
#
# Subcategory fields (for fine-grained tables):
#   vlm_group + vlm_category  — Reasoning & Planning primary vs control, and capability axis
#   vla_env + vla_category    — Action evaluation environment plus simulation subtype
#                                core | robustness | memory | long_horizon | task_generalist
#   wm_category               — World Modeling dimension:
#                                perceptual | generation | interactive | embodied_utility | physical

