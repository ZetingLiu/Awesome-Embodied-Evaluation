# Single source of truth for benchmark tables in README.md / README_CN.md.
#
# Human-curated fields: name, track, year_*, tests_*, metric_*, links.
# Machine-managed fields (Stars / Updated) are fetched at render time using
# `repo` and injected by scripts/render_readme.py.
#
# `repo` is "owner/name" for GitHub metadata lookup. Use null when there is
# no single official GitHub repository.
#
# VLM entries additionally use `vlm_group`:
#   - primary: embodied-oriented benchmarks (main list)
#   - control: general multimodal benchmarks (control set)

benchmarks:
  # ---------------- VLM (Embodied Primary) ----------------
  - name: Where2Place
    track: vlm
    vlm_group: primary
    year_en: "2024"
    year_cn: "2024"
    tests_en: "Spatial free-space reference: language-conditioned placement in cluttered real scenes"
    tests_cn: "空闲空间指代与放置点预测：在杂乱真实场景中根据语言定位可放置区域"
    metric_en: "Point accuracy"
    metric_cn: "点位准确率"
    repo: wentaoyuan/RoboPoint
    links:
      - {en: Paper, cn: 论文, url: https://arxiv.org/abs/2406.10721}
      - {en: Code, cn: 代码, url: https://github.com/wentaoyuan/RoboPoint}
      - {en: Dataset, cn: 数据集, url: https://huggingface.co/datasets/wentao-yuan/where2place}

