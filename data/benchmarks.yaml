# Single source of truth for the benchmark tables in README.md / README_CN.md.
#
# Human-curated fields: name, track, year_*, tests_*, metric_*, links.
# Machine-managed fields (Stars / Updated) are NOT stored here; they are fetched
# at render time from the GitHub API using `repo` and injected by
# scripts/render_readme.py into the marked table blocks.
#
# `repo` is "owner/name" of the primary GitHub repository used for stars and
# last-push date. Set it to null when the entry has no single GitHub repo.
#
# List order == table row order. Entries are grouped by `track` (vlm | vla | wm)
# and rendered in the order they appear here.

benchmarks:
